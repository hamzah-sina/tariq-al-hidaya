buildscript {
    ext.kotlin_version = '2.0.21'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.6.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy {
            force 'androidx.window:window:1.0.0'
            force 'androidx.window:window-java:1.0.0'
            force 'androidx.datastore:datastore-android:1.1.1'
            force 'androidx.datastore:datastore-core-android:1.1.1'
            force 'androidx.datastore:datastore-preferences-android:1.1.1'
        }
    }
}

subprojects {
    afterEvaluate { proj ->
        proj.tasks.matching { it.name.contains("AarMetadata") }.configureEach {
            enabled = false
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
